    :root{--bg:#000;--muted:rgba(255,255,255,0.58);--accent:#fff}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--accent);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;position:relative;overflow-x:hidden}
    body.tg-app{padding-top:120px}
    .tabs{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;gap:8px;padding:53px 14px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.12)}
    .background-svg{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden}
    .club-dropdown-wrap{position:fixed;top:115px;left:14px;z-index:9999}
    .club-dropdown-trigger{appearance:none;border:1px solid rgba(255,255,255,.18);background:#000;color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600;font-size:14px;transition:all .35s cubic-bezier(0.22,1,0.36,1);font-family:inherit;display:flex;align-items:center;gap:8px}
    .club-dropdown-trigger:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:translateY(-1px)}
    .club-dropdown-trigger:active{transform:translateY(0) scale(.98)}
    .club-dropdown-trigger::after{content:"▾";font-size:11px;color:rgba(255,255,255,.6);transition:transform .25s ease}
    .club-dropdown-trigger.open::after{transform:rotate(180deg)}
    .club-dropdown-menu{position:absolute;top:100%;left:0;margin-top:6px;background:#0d0d0d;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:6px;min-width:180px;z-index:10001;box-shadow:0 20px 50px rgba(0,0,0,.5);animation:slideDown .2s ease;overflow:hidden}
    .club-dropdown-menu[hidden]{display:none}
    .club-dropdown-item{display:block;width:100%;padding:10px 14px;border:none;border-radius:8px;background:transparent;color:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;transition:background .2s ease}
    .club-dropdown-item:hover{background:rgba(255,255,255,.08)}
    .club-dropdown-item.active{background:rgba(255,255,255,.12);color:#fff}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.content{padding-bottom:0}
.tab-panels{padding:0}
    .panel{display:none}
    .panel.is-active{display:block}
    iframe{display:block;width:100%;height:calc(100dvh - 60px);margin-top:60px;border:0;border-radius:0;background:rgba(0,0,0,.35);overflow:hidden}
    .booking-contacts{display:none}

    .map-legend{display:none}

    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:9999;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));align-items:center;height:70px;padding:6px 8px calc(6px + env(safe-area-inset-bottom));box-sizing:border-box;background:#050505;border-top:1px solid rgba(255,255,255,.08);pointer-events:auto}
    .bottom-nav *{pointer-events:auto}
    .nav-item{display:grid;grid-template-rows:28px 14px;gap:5px;justify-items:center;align-content:center;width:100%;height:54px;min-width:0;padding:0 2px;box-sizing:border-box;color:var(--muted);text-decoration:none;font-size:10px;line-height:1;transition:color .35s cubic-bezier(0.22,1,0.36,1),transform .35s cubic-bezier(0.22,1,0.36,1)}
    .nav-item:hover{color:var(--accent);transform:translateY(-1px)}
    .nav-item:active{transform:translateY(0) scale(.96)}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nav-item span{display:block;width:100%;line-height:14px;text-align:center;white-space:nowrap;overflow:hidden}
    @supports not (height: 100dvh) {

      iframe{height:calc(100dvh - 120px) !important}

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.disableVerticalSwipes();
      document.body.classList.add('tg-app');

      window.addEventListener('load', function() {
        window.Telegram.WebApp.expand();
        try {
          window.Telegram.WebApp.requestFullscreen();
        } catch(e) {}
        if (!window.Telegram.WebApp.isExpanded) {
          var timer = setInterval(function() {
            window.Telegram.WebApp.expand();
            try {
              window.Telegram.WebApp.requestFullscreen();
            } catch(e) {}
            if (window.Telegram.WebApp.isExpanded) {
              clearInterval(timer);
            }
          }, 100);
          setTimeout(function() { clearInterval(timer); }, 3000);
        }
      });
    }

    // Force cache busting for Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
      const currentVersion = '20260605-4';
      const storedVersion = localStorage.getItem('mapAppVersion');

      if (storedVersion !== currentVersion) {
        localStorage.setItem('mapAppVersion', currentVersion);
        // Force reload to ensure latest version
        if (window.location.href.includes('map.html')) {
          window.location.reload(true);
        }
      }
    }

    // Mobile viewport fix
    function fixMobileViewport() {
      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        // Set viewport height correctly for mobile devices
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);

        // Adjust iframe height for mobile
        const iframe = document.querySelector('iframe');
        if (iframe) {
          iframe.style.height = `calc(100vh - 120px)`;
        }
      }
    }

    // Run on load and resize
    window.addEventListener('load', fixMobileViewport);
    window.addEventListener('resize', fixMobileViewport);
    window.addEventListener('orientationchange', fixMobileViewport);

    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'call' && e.data.number) {
        window.location.href = 'tel:' + e.data.number;
      }
    });
  </script>

  <script>
    (function() {
      const trigger = document.getElementById('club-trigger');
      const menu = document.getElementById('club-menu');
      const items = menu.querySelectorAll('.club-dropdown-item');
      const panels = {
        tr: document.getElementById('panel-tr'),
        ar: document.getElementById('panel-ar'),
        sp: document.getElementById('panel-sp'),
        ko: document.getElementById('panel-ko'),
        kn: document.getElementById('panel-kn'),
        ke: document.getElementById('panel-ke'),
        km: document.getElementById('panel-km'),
        as: document.getElementById('panel-as'),
        mh: document.getElementById('panel-mh')
      };
      const names = {
        tr: 'ТРИУМФ',
        ar: 'АРНАУ',
        sp: 'САТПАЕВА',
        ko: 'КОШКАРБАЕВА',
        kn: 'БАЙТУРСЫНОВА',
        ke: 'КЕНЕСАРЫ',
        km: 'КУМЫСБЕКОВА',
        as: 'SAT CITY',
        mh: 'МУХАМЕДХАНОВА'
      };

      function setActive(value) {
        items.forEach(item => {
          item.classList.toggle('active', item.dataset.value === value);
        });
        Object.entries(panels).forEach(([key, panel]) => {
          panel.classList.toggle('is-active', key === value);
        });
        trigger.textContent = names[value] || value;
        menu.hidden = true;
        trigger.classList.remove('open');
      }

      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        const isHidden = menu.hidden;
        menu.hidden = !isHidden;
        trigger.classList.toggle('open', isHidden);
      });

      items.forEach(item => {
        item.addEventListener('click', function() {
          setActive(this.dataset.value);
        });
      });

      document.addEventListener('click', function() {
        menu.hidden = true;
        trigger.classList.remove('open');
      });
    })();
  </script>
