<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Коды клубов</title>
  <style>
    :root{--bg:#000;--muted:rgba(255,255,255,0.58);--accent:#fff}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--accent);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;position:relative;overflow-x:hidden}
    body.tg-app{padding-top:120px}
    .tabs{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;gap:8px;padding:53px 14px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.12)}
    .background-svg{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden}
    .content{min-height:100%;box-sizing:border-box;padding:110px 16px 160px;display:flex;flex-direction:column;align-items:center}
    .club-dropdown-wrap{position:relative;width:100%;max-width:420px;z-index:100;margin-top:24px}
    .club-dropdown-trigger{appearance:none;width:100%;border:1px solid rgba(255,255,255,.18);background:#000;color:#fff;padding:12px 40px 12px 14px;border-radius:12px;cursor:pointer;font-weight:600;font-size:16px;transition:all .35s cubic-bezier(0.22,1,0.36,1);font-family:inherit;display:flex;align-items:center;gap:10px;text-align:left}
    .club-dropdown-trigger:hover{border-color:rgba(255,255,255,.3);transform:translateY(-1px)}
    .club-dropdown-trigger:active{transform:translateY(0) scale(.98)}
    .club-dropdown-trigger::after{content:"▾";position:absolute;right:14px;font-size:12px;color:rgba(255,255,255,.6);transition:transform .25s ease}
    .club-dropdown-trigger.open::after{transform:rotate(180deg)}
    .club-dropdown-menu{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:#0d0d0d;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:6px;z-index:101;box-shadow:0 20px 50px rgba(0,0,0,.5);animation:slideDown .2s ease;max-height:60vh;overflow-y:auto}
    .club-dropdown-menu[hidden]{display:none}
    .club-dropdown-item{display:block;width:100%;padding:12px 14px;border:none;border-radius:8px;background:transparent;color:#fff;font-size:15px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;transition:background .2s ease}
    .club-dropdown-item:hover{background:rgba(255,255,255,.08)}
    .club-dropdown-item.active{background:rgba(255,255,255,.12)}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .code-display{width:100%;max-width:420px;margin-top:24px;padding:20px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.04);text-align:center;box-sizing:border-box}
    .code-display.hidden{display:none}
    .code-label{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px}
    .code-value{font-size:32px;font-weight:800;letter-spacing:4px;color:#fff}
    .code-hint{width:100%;max-width:420px;margin-top:16px;padding:16px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));box-sizing:border-box}
    .code-hint.hidden{display:none}
    .code-hint-title{font-size:14px;font-weight:700;color:#fff;text-align:center;margin-bottom:12px}
    .code-hint table{width:100%;border-collapse:collapse;font-size:13px}
    .code-hint td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top;color:rgba(255,255,255,.85)}
    .code-hint td:first-child{width:32px;color:rgba(255,255,255,.35);font-weight:700;text-align:center;font-size:15px}
    .code-hint tr:last-child td{border-bottom:none}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:9999;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));align-items:center;height:70px;padding:6px 8px calc(6px + env(safe-area-inset-bottom));box-sizing:border-box;background:#050505;border-top:1px solid rgba(255,255,255,.08);pointer-events:auto}
    .bottom-nav *{pointer-events:auto}
    .nav-item{display:grid;grid-template-rows:28px 14px;gap:5px;justify-items:center;align-content:center;width:100%;height:54px;min-width:0;padding:0 2px;box-sizing:border-box;color:var(--muted);text-decoration:none;font-size:10px;line-height:1;transition:color .35s cubic-bezier(0.22,1,0.36,1),transform .35s cubic-bezier(0.22,1,0.36,1)}
    .nav-item:hover{color:var(--accent);transform:translateY(-1px)}
    .nav-item:active{transform:translateY(0) scale(.96)}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nav-item span{display:block;width:100%;line-height:14px;text-align:center;white-space:nowrap;overflow:hidden}
    .contact-footer{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;z-index:10000;width:calc(min(420px,100% - 32px));padding:12px 16px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));box-shadow:0 8px 20px rgba(0,0,0,.6);backdrop-filter:blur(6px)}
    .contact-footer .contact-title{font-weight:700;margin-bottom:8px;color:#fff;text-align:center}
    .contact-footer .contact-list{display:grid;gap:8px}
    .contact-footer .contact-item{display:block;padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);color:#fff;text-decoration:none;font-weight:700;text-align:center}
    @media (max-width:420px){.contact-footer{bottom:82px;padding:10px}}
  </style>

  <script>
    (function() {
      const trigger = document.getElementById('club-trigger');
      const menu = document.getElementById('club-menu');
      const items = menu.querySelectorAll('.club-dropdown-item');
      const codeDisplay = document.getElementById('code-display');
      const codeValue = document.getElementById('code-value');

      const codes = {
        triumph: 'D6H8L',
        arnau: 'D6H8L',
        satpaeva: 'CORTP',
        koshkarbaeva: 'J9J4Q',
        baitursynova: 'W51TC',
        kenesary: 'KJKJQ',
        kumisbekova: 'ZITKD',
        asfendiyarova: 'I5L57',
        mukhamedkhanova: 'JSTOY'
      };

      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        const isHidden = menu.hidden;
        menu.hidden = !isHidden;
        trigger.classList.toggle('open', isHidden);
      });

      items.forEach(item => {
        item.addEventListener('click', function() {
          const val = this.dataset.value;
          trigger.textContent = this.textContent;
          menu.hidden = true;
          trigger.classList.remove('open');
          codeDisplay.classList.remove('hidden');
          codeValue.textContent = codes[val] || '—';
        });
      });

      document.addEventListener('click', function() {
        menu.hidden = true;
        trigger.classList.remove('open');
      });
    })();
  </script>
