                <div class="zone-pc-list" id="zone-50-56"></div>

<script>
(function(){
const OFFICE_ID=1;
const USER_INFO_URL_PREFIX="https://primegamehub.app.enes.tech/api/v2/map/";
const TOKEN_STORAGE_KEY="primegamehub.map.capToken.v2";
const TOKEN_REFRESH_MS=10*24*60*60*1000;
const REFRESH_INTERVAL_MS=30000;
const cards=Array.from(document.querySelectorAll('.soon-card[data-soon]'));
const releaseDates=new Array(cards.length).fill(null);
let cachedToken=null;
let cachedTokenAt=0;
let inFlight=false;

const zoneElements = {
  '1-41': document.getElementById('zone-1-41'),
  '42-49': document.getElementById('zone-42-49'),
  '50-56': document.getElementById('zone-50-56'),
  '57-61': document.getElementById('zone-57-61'),
};

const zoneDropdown = document.getElementById('zone-dropdown');
const zoneDropdownMenu = document.getElementById('zone-dropdown-menu');

function getZoneForPC(num) {
  if (num == null) return null;
  const n = Number(num);
  if (!Number.isFinite(n)) return null;
  if (n >= 1 && n <= 41) return '1-41';
  if (n >= 42 && n <= 49) return '42-49';
  if (n >= 50 && n <= 56) return '50-56';
  if (n >= 57 && n <= 61) return '57-61';
  return null;
}

function getNestedField(source,path){return path.split('.').reduce((v,k)=>v?.[k],source);}
function getNumberField(source,keys){for(const key of keys){const value=getNestedField(source,key);if(value!=null&&value!==''&&!Number.isNaN(Number(value)))return Number(value);}return null;}
function parseApiDate(value){if(value==null||value==='')return null;if(typeof value==='number'||/^\d+$/.test(String(value))){const ts=Number(value);const date=new Date(ts<10000000000?ts*1000:ts);return Number.isNaN(date.getTime())?null:date;}const normalized=String(value).includes('T')?String(value):String(value).replace(' ','T');const date=new Date(normalized);return Number.isNaN(date.getTime())?null:date;}
function getReleaseDate(pc){const dateKeys=["end_time","ends_at","finish_time","finished_at","expires_at","expired_at","paid_to","time_end","session_end_time","session_ends_at","session_finish_time","current_session.end_time","current_session.ends_at","current_session.expires_at"];for(const key of dateKeys){const d=parseApiDate(getNestedField(pc,key));if(d)return d;}const secondsLeft=getNumberField(pc,["seconds_left","remaining_seconds","session_seconds_left","current_session.seconds_left","current_session.remaining_seconds"]);if(secondsLeft!=null&&secondsLeft>0)return new Date(Date.now()+secondsLeft*1000);const minutesLeft=getNumberField(pc,["minutes_left","remaining_minutes","time_left","session_minutes_left","current_session.minutes_left","current_session.remaining_minutes"]);if(minutesLeft!=null&&minutesLeft>0)return new Date(Date.now()+minutesLeft*60*1000);const spent=getNumberField(pc,["spent_minutes"]);const total=getNumberField(pc,["total_minutes"]);if(spent!=null&&total!=null&&total>spent)return new Date(Date.now()+(total-spent)*60*1000);return null;}
function formatTimeRemaining(releaseDate){if(!releaseDate)return "—";const diffMs=releaseDate.getTime()-Date.now();if(diffMs<=0)return "Сейчас";const totalSec=Math.floor(diffMs/1000);if(totalSec<60)return totalSec+" сек";const totalMin=Math.floor(totalSec/60);if(totalMin<60)return totalMin+" мин";const h=Math.floor(totalMin/60);const m=totalMin%60;return m===0?(h+" ч"):(h+" ч "+m+" мин");}
function cardClass(remaining){if(!remaining||remaining==="—")return "is-empty";if(remaining==="Сейчас")return "is-now";const m=remaining.match(/^(\d+)\s*мин/);if(m&&Number(m[1])<=5)return "is-urgent";return "";}
function isBusy(pc){const statusId=Number(pc.dic_workstation_status_id);return [1,2,3,4].includes(statusId);}
const BACKEND_URL="";
async function getToken(){const now=Date.now();if(cachedToken&&(now-cachedTokenAt)<TOKEN_REFRESH_MS)return cachedToken;try{const stored=localStorage.getItem(TOKEN_STORAGE_KEY);if(stored){const parsed=JSON.parse(stored);if(parsed?.token&&parsed?.createdAt&&(now-parsed.createdAt)<TOKEN_REFRESH_MS){cachedToken=parsed.token;cachedTokenAt=parsed.createdAt;return cachedToken;}}}catch{}    try{const res=await fetch(BACKEND_URL+'/api/token?_primegamehub=1',{method:'GET'});if(!res.ok)throw new Error('token HTTP '+res.status);const json=await res.json();const token=json?.token;if(!token)throw new Error('no token in response');cachedToken=token;cachedTokenAt=now;try{localStorage.setItem(TOKEN_STORAGE_KEY,JSON.stringify({token,createdAt:now}));}catch{}return token;}catch(err){console.warn('getToken failed:',err);return null;}}
const MAP_API_URL="https://primegamehub.app.enes.tech";
async function fetchMap(){const res=await fetch(BACKEND_URL+'/api/map?office_id='+OFFICE_ID+'&limit=9999&_primegamehub=1');if(!res.ok)throw new Error('map HTTP '+res.status);const json=await res.json();return Array.isArray(json?.results)?json.results:[];}
async function fetchUserInfo(pcId,_token){if(!pcId)return null;try{const res=await fetch(BACKEND_URL+'/api/user-info?pc_id='+pcId+'&_primegamehub=1');if(!res.ok)return null;return await res.json();}catch{return null;}}
function renderCard(index,item){const card=cards[index];if(!card)return;if(item){const num=String(item.pc.num??item.pc.device_name??'?');card.className='soon-card '+cardClass(formatTimeRemaining(item.releaseDate));card.querySelector('.soon-card-num').textContent=num;card.querySelector('.soon-card-time').textContent=formatTimeRemaining(item.releaseDate);}else{card.className='soon-card is-empty';card.querySelector('.soon-card-num').textContent='—';card.querySelector('.soon-card-time').textContent='—';}}

function renderZoneDropdown(withDates) {
  Object.values(zoneElements).forEach(el => { if (el) el.innerHTML = ''; });
  
  const grouped = {};
  withDates.forEach(item => {
    const num = item.pc.num ?? item.pc.device_name;
    const zone = getZoneForPC(num);
    if (!zone) return;
    if (!grouped[zone]) grouped[zone] = [];
    grouped[zone].push(item);
  });

  Object.entries(grouped).forEach(([zone, items]) => {
    const el = zoneElements[zone];
    if (!el) return;
    items.sort((a, b) => a.releaseDate - b.releaseDate);
    items.forEach(item => {
      const num = String(item.pc.num ?? item.pc.device_name ?? '?');
      const time = formatTimeRemaining(item.releaseDate);
      const div = document.createElement('div');
      div.className = 'zone-pc-item';
      div.innerHTML = `<span class="zone-pc-num">${num}</span><span class="zone-pc-time">${time}</span>`;
      el.appendChild(div);
    });
  });

  Object.entries(zoneElements).forEach(([zone, el]) => {
    if (el && el.children.length === 0) {
      el.innerHTML = '<div class="zone-empty-text">Нет ожидающих</div>';
    }
  });
}

if (zoneDropdown && zoneDropdownMenu) {
  zoneDropdown.addEventListener('click', (e) => {
    e.stopPropagation();
    const isHidden = zoneDropdownMenu.hidden;
    zoneDropdownMenu.hidden = !isHidden;
    zoneDropdown.classList.toggle('menu-open', !isHidden);
  });

  document.addEventListener('click', (e) => {
    if (!zoneDropdown.contains(e.target)) {
      zoneDropdownMenu.hidden = true;
      zoneDropdown.classList.remove('menu-open');
    }
  });
}

async function refreshSoon(){
  if(inFlight) return;
  inFlight=true;
  try{
    let pcs=[];
    try{pcs=await fetchMap();}catch(err){console.warn('fetchMap failed:',err);}
    const busy=pcs.filter(isBusy);
    const token=await getToken();
    const withDates=(await Promise.all(busy.map(async pc=>{
      const ui=await fetchUserInfo(pc.id,token);
      const releaseDate=getReleaseDate({...pc,...ui,current_session:ui});
      return {pc,releaseDate};
    }))).filter(x=>x.releaseDate).sort((a,b)=>a.releaseDate-b.releaseDate);
    
    currentWithDates = withDates;
    
    const top5 = withDates.slice(0,5);
    for(let i=0;i<cards.length;i++){
      releaseDates[i]=top5[i]?top5[i].releaseDate:null;
      renderCard(i,top5[i]);
    }
    
    renderZoneDropdown(withDates);
  }finally{inFlight=false;}
}

let currentWithDates = [];

function tickTimers(){
  for(let i=0;i<cards.length;i++){
    if(!releaseDates[i]) continue;
    const card=cards[i];
    if(card.classList.contains('is-empty')) continue;
    const remaining=formatTimeRemaining(releaseDates[i]);
    card.querySelector('.soon-card-time').textContent=remaining;
    card.className='soon-card '+cardClass(remaining);
  }
  
  Object.entries(zoneElements).forEach(([zone, el]) => {
    if (!el) return;
    el.querySelectorAll('.zone-pc-item').forEach(item => {
      const numText = item.querySelector('.zone-pc-num').textContent;
      const data = currentWithDates.find(d => String(d.pc.num ?? d.pc.device_name) === numText);
      if (data) {
        item.querySelector('.zone-pc-time').textContent = formatTimeRemaining(data.releaseDate);
      }
    });
  });
}
refreshSoon();
setInterval(refreshSoon,REFRESH_INTERVAL_MS);
setInterval(tickTimers,1000);
})();
</script>
